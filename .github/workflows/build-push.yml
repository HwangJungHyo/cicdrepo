name: Build and Push to ECR

on:
  push:
    branches: [main]
    paths:
      - 'cicd-app/**'          # cicd-app 폴더가 바뀔 때만 실행

permissions:
  id-token: write              # OIDC 토큰 발급에 필수
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 713500447952.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPO: testns/testrepo

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::713500447952:role/github-actions-cicd      # ← 방금 만든 역할 ARN
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPO:${{ github.sha }}
          docker build -t $IMAGE ./cicd-app
          docker push $IMAGE
          echo "Pushed: $IMAGE"

      - name: Build and push
        id: build
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPO:${{ github.sha }}
          docker build -t $IMAGE ./cicd-app
          docker push $IMAGE
          # push 결과의 digest 추출
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name unique-folk-rainbow \
            --region $AWS_REGION

      - name: Deploy to dev
        run: |
          # placeholder에 digest 치환
          sed -i "s|IMAGE_PLACEHOLDER|${{ steps.build.outputs.digest }}|" cicd-app/deploy-dev.yaml
          kubectl apply -f cicd-app/deploy-dev.yaml -n dev
          kubectl rollout status deployment/cicdapp -n dev --timeout=300s
