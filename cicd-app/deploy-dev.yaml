apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicdapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cicdapp
  template:
    metadata:
      labels:
        app: cicdapp
    spec:
      containers:
      - name: cicdapp
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: app-config
